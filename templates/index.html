<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Quote Lookup</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.25rem;
            color: #38bdf8;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 420px;
        }

        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            text-transform: uppercase;
        }

        input:focus { border-color: #38bdf8; }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            background: #0ea5e9;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #0284c7; }
        button:disabled { background: #475569; cursor: not-allowed; }

        .error {
            color: #f87171;
            margin-bottom: 1rem;
            text-align: center;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            width: 100%;
            max-width: 420px;
            display: none;
        }

        .card.visible { display: block; }

        .card .symbol {
            font-size: 1.5rem;
            font-weight: 700;
            color: #38bdf8;
        }

        .card .price {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .card .currency {
            font-size: 1rem;
            color: #94a3b8;
            font-weight: 400;
        }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 1rem;
            border-top: 1px solid #334155;
            padding-top: 1rem;
        }

        .detail-item label {
            display: block;
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .detail-item span {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .spinner {
            display: none;
            border: 3px solid #334155;
            border-top-color: #38bdf8;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }

        .spinner.visible { display: block; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>📈 Stock Quote Lookup</h1>
    <p class="subtitle">Enter a ticker symbol to get a real-time quote</p>

    <div class="search-box">
        <input type="text" id="symbolInput" placeholder="e.g. AAPL" maxlength="5"
               aria-label="Ticker symbol" autocomplete="off">
        <button id="searchBtn" onclick="fetchQuote()">Search</button>
    </div>

    <div id="error" class="error"></div>
    <div id="spinner" class="spinner"></div>

    <div id="quoteCard" class="card">
        <div class="symbol" id="qSymbol"></div>
        <div class="price" id="qPrice"><span class="currency" id="qCurrency"></span></div>
        <div class="details">
            <div class="detail-item"><label>Open</label><span id="qOpen">—</span></div>
            <div class="detail-item"><label>Prev Close</label><span id="qPrevClose">—</span></div>
            <div class="detail-item"><label>Day Low</label><span id="qDayLow">—</span></div>
            <div class="detail-item"><label>Day High</label><span id="qDayHigh">—</span></div>
        </div>
    </div>

    <script>
        const input = document.getElementById("symbolInput");
        const btn   = document.getElementById("searchBtn");

        input.addEventListener("keydown", e => { if (e.key === "Enter") fetchQuote(); });

        async function fetchQuote() {
            const symbol = input.value.trim().toUpperCase();
            if (!symbol) return;

            const errorEl   = document.getElementById("error");
            const spinner   = document.getElementById("spinner");
            const card      = document.getElementById("quoteCard");

            errorEl.textContent = "";
            card.classList.remove("visible");
            spinner.classList.add("visible");
            btn.disabled = true;

            try {
                const res = await fetch(`/api/quote/${encodeURIComponent(symbol)}`);
                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.detail || "Something went wrong.";
                    return;
                }

                document.getElementById("qSymbol").textContent    = data.symbol;
                document.getElementById("qPrice").innerHTML       =
                    `${data.price} <span class="currency">${data.currency}</span>`;
                document.getElementById("qOpen").textContent      = data.open ?? "—";
                document.getElementById("qPrevClose").textContent = data.previous_close ?? "—";
                document.getElementById("qDayLow").textContent    = data.day_low ?? "—";
                document.getElementById("qDayHigh").textContent   = data.day_high ?? "—";
                card.classList.add("visible");
            } catch {
                errorEl.textContent = "Network error. Please try again.";
            } finally {
                spinner.classList.remove("visible");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
